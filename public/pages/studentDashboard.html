<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Student Dashboard — IIT-JU Classroom Tracker</title>
    <meta name="description" content="Student schedule viewer for IIT, Jahangirnagar University">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
    <div class="app-container">
        <!-- Top Navigation -->
        <nav class="top-nav">
            <div class="logo-area">
                <img src="../images/iit-ju-logo.png" alt="IIT-JU" class="nav-logo">
                <div class="nav-brand">
                    <span class="nav-brand-title">IIT-JU</span>
                    <span class="nav-brand-sub">Student Portal</span>
                </div>
            </div>
            <div class="nav-center">
                <span class="nav-portal-name">Classroom & Batch Availability Tracker</span>
            </div>
            <div class="nav-links">
                <span class="logout-btn" onclick="logout()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Logout
                </span>
            </div>
        </nav>

        <!-- Dashboard Header -->
        <header class="dashboard-header">
            <div class="header-info">
                <div class="role-badge student-badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
                    Student
                </div>
                <div class="student-info-inline">
                    <strong id="userName">Loading...</strong>
                    <span class="roll-badge">Roll: <span id="userRollNo">—</span></span>
                    <span class="batch-badge">Batch: <span id="userBatch">—</span></span>
                    <span class="sem-badge">Sem: <span id="userSemester">—</span></span>
                </div>
                <div class="date-box" id="currentDate"></div>
            </div>
            <div class="header-actions">
                <div class="filter-controls">
                    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="searchFilter" placeholder="Search course or room...">
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="dashboard-main">
            <!-- Schedule Grid -->
            <div class="schedule-wrapper">
                <div class="schedule-grid-container">
                    <table class="schedule-table" id="scheduleTable">
                        <thead id="tableHeader">
                            <tr>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody id="scheduleBody">
                            <tr><td colspan="6" class="loading-cell">
                                <div class="loading-spinner"></div>
                                Loading your schedule...
                            </td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Details Panel -->
            <div class="details-panel" id="detailsPanel">
                <h3>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    Class Details
                </h3>
                <div id="detailsContent">
                    <div class="no-selection">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#c8d8e8" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                        <p>Select a class to<br>view its details</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/studentDashboard.js"></script>
</body>
</html>
