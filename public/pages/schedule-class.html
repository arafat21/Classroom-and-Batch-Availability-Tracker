<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Schedule Class — IIT-JU Classroom Tracker</title>
    <meta name="description" content="Grid-based class scheduling portal for IIT, Jahangirnagar University">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/schedule.css">
</head>
<body>
    <div class="app-container">
        <!-- Top Navigation -->
        <nav class="top-nav">
            <div class="logo-area">
                <img src="../images/iit-ju-logo.png" alt="IIT-JU" class="nav-logo">
                <div class="nav-brand">
                    <span class="nav-brand-title">IIT-JU</span>
                    <span class="nav-brand-sub">Teacher Portal</span>
                </div>
            </div>
            <div class="nav-center">
                <span class="nav-portal-name">Classroom & Batch Availability Tracker</span>
            </div>
            <div class="nav-links">
                <span class="logout-btn" id="logoutBtn" onclick="logout()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Logout
                </span>
            </div>
        </nav>

        <!-- Dashboard Header -->
        <header class="dashboard-header">
            <div class="header-info">
                <button class="back-dashboard-btn" onclick="window.location.href = '/pages/teacherDashboard.html'">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12,19 5,12 12,5"/></svg>
                    Back to Dashboard
                </button>
                <div class="role-badge teacher-badge" style="margin-left: 10px;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Teacher Scheduler
                </div>
            </div>
            <div class="header-actions" style="gap: 15px;">
                <div class="selection-control">
                    <label for="courseSelect">Course:</label>
                    <select id="courseSelect" onchange="loadAvailabilityGrid()">
                        <option value="">— Select Course —</option>
                    </select>
                </div>
                <div class="selection-control">
                    <label for="classroomSelect">Classroom:</label>
                    <select id="classroomSelect" onchange="loadAvailabilityGrid()">
                        <option value="all">All Classrooms</option>
                    </select>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="dashboard-main">
            <!-- Availability Grid Wrapper -->
            <div class="schedule-wrapper">
                <div class="schedule-grid-container" id="gridContainer">
                    <!-- Placeholder prior to selection -->
                    <div class="empty-grid-placeholder">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#b3c6e8" stroke-width="1.5">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                            <circle cx="12" cy="16" r="1.5" fill="#b3c6e8"/>
                        </svg>
                        <h3>Select a Course to View Available Slots</h3>
                        <p>We'll show you a 30-day grid where the teacher, classroom, and batches are free at once.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script imports -->
    <script src="../js/schedule.js"></script>
</body>
</html>
